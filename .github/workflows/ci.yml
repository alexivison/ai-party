name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/party-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/party-cli/go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...
        env:
          PARTY_REPO_ROOT: ${{ github.workspace }}

  hook-tests:
    name: Hook Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name 'CI'
          git config --global user.email 'ci@test.local'

      - name: Run hook tests
        run: bash claude/hooks/tests/run-all.sh

      - name: Run transport template tests
        run: bash claude/skills/codex-transport/tests/test-templates.sh
