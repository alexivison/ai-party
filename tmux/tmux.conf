# Source base config from dotfiles
source-file ~/Code/dotfiles/.tmux.base.conf

# --- Party-specific overrides ---

# Party session switching and master jump (direct party-cli calls).
# Fallback to go run for fresh checkouts where party-cli isn't on PATH.
bind-key p display-popup -E -w 60% -h 40% "command -v party-cli >/dev/null && party-cli picker || PARTY_REPO_ROOT=~/Code/ai-party go -C ~/Code/ai-party/tools/party-cli run . picker"
bind-key m run-shell "command -v party-cli >/dev/null && party-cli jump-master || PARTY_REPO_ROOT=~/Code/ai-party go -C ~/Code/ai-party/tools/party-cli run . jump-master"
bind-key n next-window
bind-key N display-popup -E -w 60% -h 5 "def='#{pane_current_path}' && printf 'Session title (enter for auto): ' && read title && printf 'Working dir [%s]: ' \"\$def\" && read cwd && cwd=\"\${cwd:-\$def}\" && { command -v party-cli >/dev/null && party-cli start --attach --cwd \"\$cwd\" \"\$title\" || PARTY_REPO_ROOT=~/Code/ai-party go -C ~/Code/ai-party/tools/party-cli run . start --attach --cwd \"\$cwd\" \"\$title\"; }"
bind-key M display-popup -E -w 60% -h 5 "def='#{pane_current_path}' && printf 'Master session title (enter for auto): ' && read title && printf 'Working dir [%s]: ' \"\$def\" && read cwd && cwd=\"\${cwd:-\$def}\" && { command -v party-cli >/dev/null && party-cli start --master --attach --cwd \"\$cwd\" \"\$title\" || PARTY_REPO_ROOT=~/Code/ai-party go -C ~/Code/ai-party/tools/party-cli run . start --master --attach --cwd \"\$cwd\" \"\$title\"; }"

# Party pane layout
bind-key L resize-pane -t 0 -x 18% \; resize-pane -t 2 -x 43%

# Suppress window activity alerts — prevents Wizard window flashing green
set-option -g monitor-activity off
set-option -g visual-activity off

# Override dotbar status with party context and git status
set-option -g @tmux-dotbar-session-text " ⚔ #S "
set-option -g @tmux-dotbar-status-left "#[bg=#22272e,fg=#768390]#{?client_prefix,, ⚔ #S }#[bg=#57ab5a,fg=#22272e,bold]#{?client_prefix, ⚔ #S ,}#[bg=#22272e,fg=#768390,nobold] #[fg=#adbac7] #{b:pane_current_path}  #[fg=#444c56]|  #(~/Code/ai-party/tmux/context-status.sh)"
set-option -g @tmux-dotbar-status-right "#(cat '#{socket_path}-#{session_id}-vimbridge' 2>/dev/null)#(~/Code/ai-party/tmux/git-status.sh #{pane_current_path})#(~/Code/ai-party/tmux/other-sessions.sh)"

# Re-run TPM to apply overridden dotbar vars
run '~/.tmux/plugins/tpm/tpm'

# Agent windows (window 0) get dimmed per-window at launch time via:
#   tmux set-option -w -t "$session:0" window-status-style "fg=#444444"
# This is set in party.sh's _party_launch_sidebar function.
