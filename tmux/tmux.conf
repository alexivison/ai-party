# Source base config from dotfiles
source-file ~/Code/dotfiles/.tmux.base.conf

# --- Party-specific overrides ---

# Party session switching and master jump (direct party-cli calls).
# Fallback to go run for fresh checkouts where party-cli isn't on PATH.
# run-shell evaluates #{} formats; display-popup in tmux 3.6+ does not.
bind-key p run-shell -b 'tmux display-popup -E -w 60% -h 40% "command -v party-cli >/dev/null && party-cli picker --pane-path #{q:pane_current_path} || PARTY_REPO_ROOT=~/Code/ai-party go -C ~/Code/ai-party/tools/party-cli run . picker --pane-path #{q:pane_current_path}"'
bind-key m run-shell "command -v party-cli >/dev/null && party-cli jump-master || PARTY_REPO_ROOT=~/Code/ai-party go -C ~/Code/ai-party/tools/party-cli run . jump-master"
bind-key n next-window

# Party pane layout
bind-key L resize-pane -t 0 -x 18% \; resize-pane -t 2 -x 43%

# Suppress window activity alerts — prevents Wizard window flashing green
set-option -g monitor-activity off
set-option -g visual-activity off

# Override status bar with party context (pill-shaped segments)
set-option -g status-left "#{?client_prefix,#[fg=#5aa75f]#[bg=#22272e]#[fg=#22272e]#[bg=#5aa75f]#[bold] ⚔ #S #[fg=#5aa75f]#[bg=#22272e]#[nobold],#[fg=#343b45]#[bg=#22272e]#[fg=#adbac7]#[bg=#343b45] ⚔ #S #[fg=#343b45]#[bg=#22272e]} #[fg=#343b45,bg=#22272e]#[fg=#adbac7,bg=#343b45]  #{b:pane_current_path} #[fg=#343b45,bg=#22272e] #[fg=#343b45,bg=#22272e]#[fg=#adbac7,bg=#343b45] #[fg=#343b45,bg=#22272e]"

set-option -g status-right "\
#(cat '#{socket_path}-#{session_id}-vimbridge' 2>/dev/null)\
#(~/Code/ai-party/tmux/git-status.sh #{pane_current_path})"

# Pane borders — match gh-dash rendered appearance (GitHub border.muted / fg.muted).
set-option -g pane-border-style 'fg=#484f58'
set-option -g pane-active-border-style 'fg=#6e7681'

# Pane border titles — role-aware: Sidebar/Shell use labels, Claude keeps dynamic title
set-option -g pane-border-format '#{?pane_active,#[fg=#539bf5] #{?#{==:#{@party_role},sidebar},Sidebar,#{?#{==:#{@party_role},shell},Shell,#{pane_title}}} ,#[fg=#6e7681] #{?#{==:#{@party_role},sidebar},Sidebar,#{?#{==:#{@party_role},shell},Shell,#{pane_title}}} }'

# Agent windows (window 0) get dimmed per-window at launch time via:
#   tmux set-option -w -t "$session:0" window-status-style "fg=#444444"
# This is set in party.sh's _party_launch_sidebar function.
