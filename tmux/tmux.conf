# Save current pane's full scrollback to file
bind-key S run-shell 'tmux capture-pane -S - -p > "#{pane_current_path}/tmux-capture-$(date +%s).txt"' \; display "Saved to #{pane_current_path}"

# Prefix key
unbind C-b
unbind C-Space
unbind C-@
set-option -gu prefix2
set-option -g prefix C-s
set-option -g prefix2 C-q
bind-key C-s send-prefix
bind-key C-q send-prefix

# Pane navigation
bind-key -n M-Left select-pane -L
bind-key -n M-Right select-pane -R
bind-key Left select-pane -L
bind-key Right select-pane -R

# Window and session controls
bind-key t new-window
bind-key w confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind-key K clear-history \; send-keys C-l
bind-key -n M-1 select-window -t 0
bind-key -n M-2 select-window -t 1
bind-key -n M-h previous-window
bind-key -n M-l next-window
bind-key f resize-pane -Z
bind-key = select-layout even-horizontal

bind-key R source-file ~/.tmux.conf \; display "Config reloaded"
bind-key Q kill-session
bind-key r display-popup -E -w 60% -h 70%
bind-key p display-popup -E -w 60% -h 40% "~/Code/ai-config/session/party.sh --switch"
bind-key m run-shell "~/Code/ai-config/session/party-master-jump.sh"

# Core interaction
set-option -g focus-events on
set-option -g mouse on
set-option -sa terminal-overrides ",xterm*:Tc,xterm*:Ss=\\E[%p1%d q:Se=\\E[2 q"
set-option -g xterm-keys on
set-option -s extended-keys on
set-option -s extended-keys-format csi-u
set-option -s terminal-features[3] "xterm*:extkeys"
set-option -s terminal-features[4] "screen*:extkeys"
set-option -s terminal-features[5] "tmux*:extkeys"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
set-option -g exit-empty off
# Suppress window activity alerts — prevents Codex window flashing green
set-option -g monitor-activity off
set-option -g visual-activity off

# Lock pane/window naming — prevent agents from overriding
set-option -g allow-rename off
set-option -g automatic-rename off
set-option -g set-titles off

# Status bar
set-option -g status on
set-option -g status-position bottom
set-option -g status-interval 5
set-option -g status-justify left

# TPM + plugins
set-option -g @plugin 'tmux-plugins/tmux-sensible'
set-option -g @plugin 'christoomey/vim-tmux-navigator'
set-option -g @plugin 'vaaleyard/tmux-dotbar'
set-option -g @plugin 'tmux-plugins/tpm'

# tmux-dotbar — GitHub Dark Dimmed palette
set-option -g @tmux-dotbar-bg '#22272e'
set-option -g @tmux-dotbar-fg '#636e7b'
set-option -g @tmux-dotbar-fg-current '#adbac7'
set-option -g @tmux-dotbar-fg-session '#768390'
set-option -g @tmux-dotbar-fg-prefix '#57ab5a'
set-option -g @tmux-dotbar-session-text " ⚔ #S "
set-option -g @tmux-dotbar-justify "left"
set-option -g @tmux-dotbar-window-status-separator " • "
# Inject our extras into dotbar's own status vars — idempotent on reload.
# Dotbar sets the full status-left/right each time TPM runs, so no -ag duplication.
set-option -g @tmux-dotbar-status-left " ⚔ #S #[fg=#adbac7] #{b:pane_current_path}  #[fg=#444c56]|  #(~/Code/ai-config/tmux/context-status.sh)"
set-option -g @tmux-dotbar-status-right "#(cat '#{socket_path}-#{session_id}-vimbridge' 2>/dev/null)#(~/Code/ai-config/tmux/git-status.sh #{pane_current_path})"
set-option -g @tmux-dotbar-right true

run '~/.tmux/plugins/tpm/tpm'

set-option -g status-left-length 140
set-option -g status-right-length 140


# Message bar
set-option -g message-style 'fg=#539bf5,bg=default'

# Pane backgrounds — active pane slightly brighter
set-option -g window-style 'fg=#8b949e,bg=#1c2128'
set-option -g window-active-style 'fg=#adbac7,bg=#22272e'

# Pane borders — uniform, no active highlight
set-option -g pane-border-style 'fg=#373e47'
set-option -g pane-active-border-style 'fg=#373e47'

# Window status bar styling — agent vs workspace distinction
# Workspace windows (1+): bright for active, light gray for inactive
set-option -g window-status-current-style 'fg=#e0e0e0,bold'
set-option -g window-status-style 'fg=#b0bec5'
# Agent windows (window 0) get dimmed per-window at launch time via:
#   tmux set-option -w -t "$session:0" window-status-style "fg=#444444"
# This is set in party.sh's _party_launch_sidebar function.
