# Save current pane's full scrollback to file
bind-key S run-shell 'tmux capture-pane -S - -p > "#{pane_current_path}/tmux-capture-$(date +%s).txt"' \; display "Saved to #{pane_current_path}"

# Prefix key
unbind C-b
unbind C-Space
unbind C-@
set-option -gu prefix2
set-option -g prefix C-s
set-option -g prefix2 C-q
bind-key C-s send-prefix
bind-key C-q send-prefix

# Pane navigation
bind-key -n M-Left select-pane -L
bind-key -n M-Right select-pane -R
bind-key Left select-pane -L
bind-key Right select-pane -R

# Window and session controls
bind-key t new-window
bind-key w confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind-key K clear-history \; send-keys C-l
bind-key -n M-1 select-window -t 0
bind-key -n M-2 select-window -t 1
bind-key -n M-h previous-window
bind-key -n M-l next-window
bind-key f resize-pane -Z
bind-key = select-layout even-horizontal

# Auto-rebalance panes to even-horizontal
set-hook -g after-split-window "select-layout even-horizontal"
set-hook -g after-kill-pane "select-layout even-horizontal"
set-hook -g client-resized "select-layout even-horizontal"
bind-key Q kill-session
bind-key r display-popup -E -w 60% -h 70%
bind-key p display-popup -E -w 60% -h 40% "~/Code/ai-config/session/party.sh --switch"

# Core interaction
set-option -g mouse on
set-option -sa terminal-overrides ",xterm*:Tc,xterm*:Ss=\\E[%p1%d q:Se=\\E[2 q"
set-option -g xterm-keys on
set-option -s extended-keys on
set-option -s extended-keys-format csi-u
set-option -s terminal-features[3] "xterm*:extkeys"
set-option -s terminal-features[4] "screen*:extkeys"
set-option -s terminal-features[5] "tmux*:extkeys"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
set-option -g exit-empty off

# Lock pane titles — prevent agents from overriding via escape sequences
set-option -g allow-rename off
set-option -g automatic-rename off
set-option -g set-titles off

# Status bar
set-option -g status on
set-option -g status-position bottom
set-option -g status-interval 5
set-option -g status-justify centre

# TPM + plugins
set-option -g @plugin 'tmux-plugins/tmux-sensible'
set-option -g @plugin 'christoomey/vim-tmux-navigator'
set-option -g @plugin 'janoamaral/tokyo-night-tmux'
set-option -g @plugin 'tmux-plugins/tpm'

# Tokyo Night theme
set-option -g @tokyo-night-tmux_theme 'night'
set-option -g @tokyo-night-tmux_transparent 1
set-option -g @tokyo-night-tmux_window_id_style 'fsquare'
set-option -g @tokyo-night-tmux_show_path 1
set-option -g @tokyo-night-tmux_show_git 1

run '~/.tmux/plugins/tpm/tpm'

# Pane dimming — GitHub Dark Dimmed palette
set-option -g window-style 'fg=#636e7b,bg=#1e242b'
set-option -g window-active-style 'fg=#adbac7,bg=#22272e'

# Pane borders — GitHub Dark Dimmed palette
set-option -g pane-border-style 'fg=#636e7b'
set-option -g pane-active-border-style 'fg=#539bf5'

# Post-TPM overrides: centred status bar
set-option -g status-justify centre
set-option -g status-left ""
set-option -g status-right ""
set-option -g window-status-current-format "#{?client_prefix,#[fg=#2d333b#,bg=#daaa3f#,bold] 󰠠 ,#[fg=#2d333b#,bg=#539bf5#,bold] 󰤂 }#[bold,nodim] #S #[bg=default,nobold]#(~/.tmux/plugins/tokyo-night-tmux/src/path-widget.sh #{pane_current_path})#(~/.tmux/plugins/tokyo-night-tmux/src/git-status.sh #{pane_current_path})#[bg=default,nobold] #(~/.tmux/plugins/tokyo-night-tmux/src/datetime-widget.sh)"
set-option -g window-status-format ""
