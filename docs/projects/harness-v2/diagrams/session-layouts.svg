<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" font-family="JetBrains Mono, monospace" font-size="11">
  <rect width="900" height="750" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" fill="#e0e0e0" font-size="16" font-weight="bold" text-anchor="middle">Session Layouts: TUI Sidebar + Tracker</text>

  <!-- Layout 1: Standard/Worker with TUI Sidebar -->
  <text x="30" y="60" fill="#4a9eff" font-weight="bold" font-size="13">Standard / Worker Session</text>

  <!-- tmux frame -->
  <rect x="30" y="70" width="840" height="190" fill="#0d1117" stroke="#30363d" stroke-width="2" rx="4"/>

  <!-- Pane 0: party-cli TUI -->
  <rect x="35" y="75" width="170" height="180" fill="#161b22" stroke="#7c4dff" stroke-width="1.5" rx="3"/>
  <text x="120" y="92" fill="#ce93d8" font-weight="bold" text-anchor="middle" font-size="10">party-cli TUI (15%)</text>
  <line x1="40" y1="98" x2="200" y2="98" stroke="#30363d" stroke-width="1"/>
  <text x="42" y="112" fill="#4caf50" font-size="10">Codex ● idle</text>
  <text x="42" y="126" fill="#78909c" font-size="10">Last: APPROVED</text>
  <text x="42" y="140" fill="#78909c" font-size="10">Hash: a3f2..c1</text>
  <line x1="40" y1="148" x2="200" y2="148" stroke="#30363d" stroke-width="1"/>
  <text x="42" y="162" fill="#b0bec5" font-size="10">Session info</text>
  <text x="42" y="176" fill="#78909c" font-size="10">branch: feat-x</text>
  <text x="42" y="190" fill="#78909c" font-size="10">cwd: ~/Code/app</text>
  <line x1="40" y1="198" x2="200" y2="198" stroke="#30363d" stroke-width="1"/>
  <text x="42" y="212" fill="#4a9eff" font-size="9">[P]eek [E]vidence</text>
  <text x="42" y="226" fill="#4a9eff" font-size="9">[L]og  [H]elp</text>
  <text x="42" y="240" fill="#78909c" font-size="9">3s refresh</text>

  <!-- Pane 1: Claude Console -->
  <rect x="210" y="75" width="450" height="180" fill="#161b22" stroke="#4a9eff" stroke-width="1.5" rx="3"/>
  <text x="435" y="92" fill="#4a9eff" font-weight="bold" text-anchor="middle" font-size="10">Claude Console (55%)</text>
  <line x1="215" y1="98" x2="655" y2="98" stroke="#30363d" stroke-width="1"/>
  <text x="220" y="115" fill="#78909c" font-size="10">⏺ Reading file session/party.sh...</text>
  <text x="220" y="132" fill="#78909c" font-size="10">⏺ I'll fix the unquoted $lib_path</text>
  <text x="220" y="149" fill="#78909c" font-size="10">  in the tmux hook registration.</text>
  <text x="220" y="166" fill="#78909c" font-size="10">⏺ Edit: session/party.sh:83</text>
  <text x="220" y="196" fill="#4caf50" font-size="10">❯ _</text>

  <!-- Pane 2: Shell -->
  <rect x="665" y="75" width="200" height="180" fill="#161b22" stroke="#78909c" stroke-width="1" rx="3"/>
  <text x="765" y="92" fill="#b0bec5" font-weight="bold" text-anchor="middle" font-size="10">Shell (30%)</text>
  <line x1="670" y1="98" x2="860" y2="98" stroke="#30363d" stroke-width="1"/>
  <text x="675" y="115" fill="#78909c" font-size="10">$ git status</text>
  <text x="675" y="132" fill="#4caf50" font-size="10">On branch feat-x</text>
  <text x="675" y="149" fill="#78909c" font-size="10">$ _</text>

  <!-- Layout 2: Master with TUI Tracker -->
  <text x="30" y="295" fill="#ff9800" font-weight="bold" font-size="13">Master Session</text>

  <rect x="30" y="305" width="840" height="190" fill="#0d1117" stroke="#30363d" stroke-width="2" rx="4"/>

  <!-- Pane 0: party-cli TUI (tracker mode) -->
  <rect x="35" y="310" width="170" height="180" fill="#161b22" stroke="#ff9800" stroke-width="1.5" rx="3"/>
  <text x="120" y="327" fill="#ffcc80" font-weight="bold" text-anchor="middle" font-size="10">party-cli TUI (15%)</text>
  <line x1="40" y1="333" x2="200" y2="333" stroke="#30363d" stroke-width="1"/>
  <text x="42" y="347" fill="#ffcc80" font-size="10">Workers (3):</text>
  <text x="42" y="363" fill="#4caf50" font-size="10">▸ ● sidebar-fix</text>
  <text x="50" y="377" fill="#78909c" font-size="9">  reading tests...</text>
  <text x="42" y="393" fill="#4caf50" font-size="10">  ● auth-refac</text>
  <text x="50" y="407" fill="#78909c" font-size="9">  running critic</text>
  <text x="42" y="423" fill="#f44336" font-size="10">  ○ db-migrate</text>
  <text x="50" y="437" fill="#78909c" font-size="9">  stopped</text>
  <line x1="40" y1="445" x2="200" y2="445" stroke="#30363d" stroke-width="1"/>
  <text x="42" y="460" fill="#4a9eff" font-size="9">[R]elay [B]cast [S]pawn</text>
  <text x="42" y="474" fill="#4a9eff" font-size="9">[⏎]ttach [X]stop [D]el</text>

  <!-- Pane 1: Claude Console (orchestrator) -->
  <rect x="210" y="310" width="450" height="180" fill="#161b22" stroke="#ff9800" stroke-width="1.5" rx="3"/>
  <text x="435" y="327" fill="#ff9800" font-weight="bold" text-anchor="middle" font-size="10">Claude Console — Orchestrator (55%)</text>
  <line x1="215" y1="333" x2="655" y2="333" stroke="#30363d" stroke-width="1"/>
  <text x="220" y="350" fill="#78909c" font-size="10">⏺ Dispatching bugfix to worker-2</text>
  <text x="220" y="367" fill="#78909c" font-size="10">⏺ Worker sidebar-fix reports: PR</text>
  <text x="220" y="384" fill="#78909c" font-size="10">  ready at #59, tests passing.</text>
  <text x="220" y="414" fill="#4caf50" font-size="10">❯ _</text>

  <!-- Pane 2: Shell -->
  <rect x="665" y="310" width="200" height="180" fill="#161b22" stroke="#78909c" stroke-width="1" rx="3"/>
  <text x="765" y="327" fill="#b0bec5" font-weight="bold" text-anchor="middle" font-size="10">Shell (30%)</text>
  <line x1="670" y1="333" x2="860" y2="333" stroke="#30363d" stroke-width="1"/>
  <text x="675" y="350" fill="#78909c" font-size="10">$ gh pr list</text>
  <text x="675" y="367" fill="#78909c" font-size="10">#59 sidebar-fix</text>
  <text x="675" y="384" fill="#78909c" font-size="10">#58 phase-simp</text>

  <!-- Layout 3: Classic Fallback -->
  <text x="30" y="530" fill="#78909c" font-weight="bold" font-size="13">Classic Fallback (PARTY_LAYOUT=classic)</text>

  <rect x="30" y="540" width="840" height="140" fill="#0d1117" stroke="#30363d" stroke-width="2" rx="4"/>

  <!-- Pane 0: Claude -->
  <rect x="35" y="545" width="350" height="130" fill="#161b22" stroke="#4a9eff" stroke-width="1" rx="3"/>
  <text x="210" y="562" fill="#4a9eff" font-weight="bold" text-anchor="middle" font-size="10">Claude Console (45%)</text>
  <line x1="40" y1="568" x2="380" y2="568" stroke="#30363d" stroke-width="1"/>
  <text x="45" y="585" fill="#78909c" font-size="10">Standard 2+1 layout, no TUI sidebar</text>
  <text x="45" y="602" fill="#78909c" font-size="10">For users who prefer the original UX</text>

  <!-- Pane 1: Codex (visible) -->
  <rect x="390" y="545" width="280" height="130" fill="#161b22" stroke="#7c4dff" stroke-width="1" rx="3"/>
  <text x="530" y="562" fill="#ce93d8" font-weight="bold" text-anchor="middle" font-size="10">Codex Pane (30%)</text>
  <line x1="395" y1="568" x2="665" y2="568" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="585" fill="#78909c" font-size="10">Visible Codex pane (original)</text>
  <text x="400" y="602" fill="#78909c" font-size="10">No party-cli TUI needed</text>

  <!-- Pane 2: Shell -->
  <rect x="675" y="545" width="190" height="130" fill="#161b22" stroke="#78909c" stroke-width="1" rx="3"/>
  <text x="770" y="562" fill="#b0bec5" font-weight="bold" text-anchor="middle" font-size="10">Shell (25%)</text>
  <line x1="680" y1="568" x2="860" y2="568" stroke="#30363d" stroke-width="1"/>
  <text x="685" y="585" fill="#78909c" font-size="10">$ _</text>

  <!-- Notes -->
  <text x="30" y="710" fill="#78909c" font-size="10">TUI sidebar auto-detects session type: worker → Codex status + session info | master → worker tracker</text>
  <text x="30" y="727" fill="#78909c" font-size="10">party-cli TUI runs in pane 0, replacing the old Codex pane position. Codex runs detached (hidden companion session).</text>
  <text x="30" y="744" fill="#78909c" font-size="10">Classic layout preserves backward compatibility for users who opt out.</text>
</svg>
