<svg xmlns="http://www.w3.org/2000/svg" width="780" height="290" viewBox="0 0 780 290" role="img" aria-labelledby="title desc">
  <title id="title">party-cli master tracker wide mockup</title>
  <desc id="desc">Wide bordered master tracker with reverse-selected row, readable inactive titles, and footer-first hints.</desc>
  <style>
    text { font-family: "JetBrains Mono", "Menlo", monospace; font-size: 14px; }
    .border { fill: #6688cc; }
    .gold { fill: #ffd700; font-weight: bold; }
    .selected { fill: #f0f0f0; font-weight: bold; }
    .inactive-title { fill: #d0d0d0; }
    .green { fill: #5faf5f; }
    .red { fill: #d75f5f; }
    .muted { fill: #686868; }
    .dim { fill: #585858; }
  </style>
  <rect width="780" height="290" rx="6" fill="#1a1a2e"/>
  <!-- top border with gold Master -->
  <text x="20" y="30" class="border">╭─</text><text x="44" y="30" class="gold"> Master</text><text x="104" y="30" class="border">: party-master-1 ──────────────────────────────────────────────╮</text>
  <!-- selected row (reverse highlight) -->
  <rect x="28" y="38" width="724" height="22" rx="2" fill="#d0d0d0" opacity="0.15"/>
  <text x="20" y="54" class="border">│</text><text x="38" y="54" class="selected">▸ worker-a</text><text x="540" y="54" class="green">● active</text><text x="756" y="54" class="border">│</text>
  <text x="20" y="78" class="border">│</text><text x="54" y="78" class="dim">⏺ reviewing tui/style.go</text><text x="756" y="78" class="border">│</text>
  <text x="20" y="102" class="border">│</text><text x="756" y="102" class="border">│</text>
  <!-- inactive worker (brighter title, dim snippet) -->
  <text x="20" y="126" class="border">│</text><text x="46" y="126" class="inactive-title">worker-b</text><text x="540" y="126" class="red">○ stopped</text><text x="756" y="126" class="border">│</text>
  <text x="20" y="150" class="border">│</text><text x="54" y="150" class="dim">· last verdict: REQUEST_CHANGES</text><text x="756" y="150" class="border">│</text>
  <text x="20" y="174" class="border">│</text><text x="756" y="174" class="border">│</text>
  <!-- another inactive worker -->
  <text x="20" y="198" class="border">│</text><text x="46" y="198" class="inactive-title">worker-c</text><text x="540" y="198" class="green">● active</text><text x="756" y="198" class="border">│</text>
  <text x="20" y="222" class="border">│</text><text x="54" y="222" class="dim">· running go test ./tools/party-cli/internal/tui/...</text><text x="756" y="222" class="border">│</text>
  <!-- bottom border -->
  <text x="20" y="270" class="border">╰─ 3 workers · j/k nav · enter attach · r relay · s spawn · m manifest ────╯</text>
</svg>
