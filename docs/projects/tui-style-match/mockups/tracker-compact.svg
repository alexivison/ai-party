<svg xmlns="http://www.w3.org/2000/svg" width="420" height="200" viewBox="0 0 420 200" role="img" aria-labelledby="title desc">
  <title id="title">party-cli master tracker compact mockup</title>
  <desc id="desc">Compact bordered master tracker with footer-folded hints and readable inactive titles.</desc>
  <style>
    text { font-family: "JetBrains Mono", "Menlo", monospace; font-size: 14px; }
    .border { fill: #6688cc; }
    .gold { fill: #ffd700; font-weight: bold; }
    .selected { fill: #f0f0f0; font-weight: bold; }
    .inactive-title { fill: #d0d0d0; }
    .green { fill: #5faf5f; }
    .red { fill: #d75f5f; }
    .muted { fill: #686868; }
  </style>
  <rect width="420" height="200" rx="6" fill="#1a1a2e"/>
  <!-- top border -->
  <text x="16" y="30" class="border">╭─</text><text x="40" y="30" class="gold"> Master</text><text x="100" y="30" class="border">: party-master-1 ────────────────╮</text>
  <!-- selected row -->
  <rect x="24" y="38" width="372" height="22" rx="2" fill="#d0d0d0" opacity="0.15"/>
  <text x="16" y="54" class="border">│</text><text x="32" y="54" class="selected">▸ task-a</text><text x="330" y="54" class="green">●</text><text x="396" y="54" class="border">│</text>
  <!-- inactive rows -->
  <text x="16" y="78" class="border">│</text><text x="40" y="78" class="inactive-title">task-b</text><text x="330" y="78" class="red">○</text><text x="396" y="78" class="border">│</text>
  <text x="16" y="102" class="border">│</text><text x="40" y="102" class="inactive-title">task-c</text><text x="330" y="102" class="green">●</text><text x="396" y="102" class="border">│</text>
  <!-- bottom border -->
  <text x="16" y="174" class="border">╰─ 3 workers · j/k · ↵ · r · b · s · m · q ─────╯</text>
</svg>
